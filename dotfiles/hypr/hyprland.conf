# Hyprland minimal config — workstation
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# ── Monitor ──────────────────────────────────────────────────────────────────
# Auto-detect all monitors with preferred resolution
monitor = , preferred, auto, 1

# ── Input ────────────────────────────────────────────────────────────────────
input {
  kb_layout  = fr
  follow_mouse = 1
  sensitivity  = 0
  touchpad {
    natural_scroll = true
  }
}

# ── General ──────────────────────────────────────────────────────────────────
general {
  gaps_in   = 4
  gaps_out  = 8
  border_size = 2
  col.active_border   = rgb(31748f) rgb(c4a7e7) 45deg
  col.inactive_border = rgb(1f1d2e)
  layout = dwindle
}

# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
  rounding = 8
  blur {
    enabled = true
    size    = 4
    passes  = 2
  }
}

# ── Animations ───────────────────────────────────────────────────────────────
animations {
  enabled = true
  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  animation = windows, 1, 5, myBezier
  animation = fade,    1, 5, default
  animation = workspaces, 1, 6, default
}

# ── Misc ─────────────────────────────────────────────────────────────────────
misc {
  force_default_wallpaper = 0
  disable_hyprland_logo   = false
}

# ── Keybindings ──────────────────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return, exec, foot
bind = $mod, Q,      killactive
bind = $mod, Space,  exec, noctalia-shell ipc call launcher toggle
bind = $mod, F,      fullscreen
bind = $mod, V,      togglefloating

# Focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move window
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Resize (resize submap)
bind = $mod, R, submap, resize
submap = resize
binde = , h, resizeactive, -20 0
binde = , l, resizeactive,  20 0
binde = , k, resizeactive,  0 -20
binde = , j, resizeactive,  0  20
bind  = , Escape, submap, reset
submap = reset

# ── Autostart ────────────────────────────────────────────────────────────────
exec-once = noctalia-shell
