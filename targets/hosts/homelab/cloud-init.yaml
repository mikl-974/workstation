# cloud-init user-data template for the `homelab` NixOS VM (OrbStack flavor).
#
# This file is VERSIONED but contains placeholders only. It is rendered
# locally into `secrets/keys/homelab-cloud-init.yaml` (gitignored) by:
#
#     nix run .#homelab-cloud-init
#
# The rendered file is then passed to OrbStack at VM creation:
#
#     orb create -a arm64 -u root \
#       --user-data secrets/keys/homelab-cloud-init.yaml \
#       nixos homelab
#
# After ~2 min the VM is reachable as `mickael@homelab@orb` (compatibility
# user) and `admin@homelab@orb` (server profile user). The `--impure` flag is
# required so that the homelab module can detect /opt/orbstack-guest and
# disable the bootloader; cloud-init runs the rebuild with it baked in.
#
# Placeholder syntax and substitution rules mirror render-orbstack-cloud-init.sh.
#
#cloud-config
hostname: homelab
manage_etc_hosts: true

users:
  - name: root
    ssh_authorized_keys:
      - {{SSH_AUTHORIZED_KEY}}
  - name: mickael
    ssh_authorized_keys:
      - {{SSH_AUTHORIZED_KEY}}

write_files:
  - path: /var/lib/sops-nix/key.txt
    permissions: '0600'
    owner: root:root
    content: |
{{AGE_PRIVATE_KEY_BLOCK}}

runcmd:
  - [ /run/current-system/sw/bin/mkdir, -p, /etc/infra ]
  - [ /run/current-system/sw/bin/git, clone, --branch, {{INFRA_REPO_BRANCH}}, {{INFRA_REPO_URL}}, /etc/infra ]
  - [ /run/current-system/sw/bin/ssh-keygen, -A ]
  - [ /run/current-system/sw/bin/nixos-rebuild, switch, --impure, --flake, /etc/infra#homelab ]

final_message: "homelab VM bootstrap done — reachable via ssh mickael@homelab@orb"
