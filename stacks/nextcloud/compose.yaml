services:
  nextcloud:
    image: nextcloud:31.0.12-apache
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - env/public.env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?set by runtime secret injection}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?set by runtime secret injection}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_HOST_PASSWORD: ${NEXTCLOUD_REDIS_PASSWORD:?set by runtime secret injection}
    ports:
      - "${NEXTCLOUD_PORT}:80"
    volumes:
      - nextcloud-data:/var/www/html

  postgres:
    image: postgres:16.3-alpine
    restart: unless-stopped
    env_file:
      - env/public.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?set by runtime secret injection}
    volumes:
      - nextcloud-db:/var/lib/postgresql/data

  redis:
    image: redis:7.2.5-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${NEXTCLOUD_REDIS_PASSWORD:?set by runtime secret injection}

volumes:
  nextcloud-data:
  nextcloud-db:
