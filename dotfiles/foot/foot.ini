[main]
font=JetBrains Mono Nerd Font:size=11
pad=8x8

[scrollback]
lines=10000

[cursor]
style=beam
blink=yes

[mouse]
hide-when-typing=yes

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r

# Noctalia colors — sourced from dotfiles/noctalia/foot/colors.ini
include=~/.config/noctalia/foot/colors.ini
